<svg viewBox="0 0 2000 1250" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'JetBrains Mono', 'Consolas', monospace">
<defs>

  <radialGradient id="bgGlow" cx="50%" cy="50%" r="75%">
    <stop offset="0%" stop-color="#0f1420"/>
    <stop offset="100%" stop-color="#05070c"/>
  </radialGradient>

  <filter id="softGlow" x="-150%" y="-150%" width="400%" height="400%">
    <feGaussianBlur stdDeviation="4.5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <filter id="hubGlow" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur stdDeviation="9" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <radialGradient id="hubFill" cx="35%" cy="30%" r="75%">
    <stop offset="0%" stop-color="#fff8dc"/>
    <stop offset="55%" stop-color="#f5d90a"/>
    <stop offset="100%" stop-color="#b8860b"/>
  </radialGradient>


  <radialGradient id="fill-languages" cx="35%" cy="30%" r="75%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="45%" stop-color="#38bdf8"/>
    <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.55"/>
  </radialGradient>

  <radialGradient id="fill-frameworks" cx="35%" cy="30%" r="75%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="45%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.55"/>
  </radialGradient>

  <radialGradient id="fill-tools" cx="35%" cy="30%" r="75%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="45%" stop-color="#fb923c"/>
    <stop offset="100%" stop-color="#fb923c" stop-opacity="0.55"/>
  </radialGradient>

  <radialGradient id="fill-libraries" cx="35%" cy="30%" r="75%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="45%" stop-color="#34d399"/>
    <stop offset="100%" stop-color="#34d399" stop-opacity="0.55"/>
  </radialGradient>

  <radialGradient id="fill-databases" cx="35%" cy="30%" r="75%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="45%" stop-color="#fb7185"/>
    <stop offset="100%" stop-color="#fb7185" stop-opacity="0.55"/>
  </radialGradient>
</defs>

<style>
  .bg { fill: url(#bgGlow); }
  .wire {
    fill: none;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-dasharray: 6 10;
    opacity: 0.55;
    animation: flow 3.2s linear infinite;
  }
  .wire-hub { stroke-width: 2.2; opacity: 0.7; animation-duration: 4s; }
  @keyframes flow {
    to { stroke-dashoffset: -160; }
  }
  .pulse-ring {
    fill: none;
    stroke-width: 2;
    opacity: 0.9;
    transform-box: fill-box;
    transform-origin: center;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%   { transform: scale(1);    opacity: 0.85; }
    50%  { transform: scale(1.18); opacity: 0.15; }
    100% { transform: scale(1);    opacity: 0.85; }
  }
  .node-group {
    transform-box: fill-box;
    transform-origin: center;
    transition: transform 0.25s ease;
    cursor: pointer;
  }
  .node-group:hover {
    transform: scale(1.14);
  }
  .icon-txt {
    fill: #ffffff;
    font-weight: 700;
    text-anchor: middle;
    dominant-baseline: central;
    paint-order: stroke;
  }
  .label-txt {
    fill: #cfd8e3;
    text-anchor: middle;
    font-size: 15px;
    letter-spacing: 0.3px;
  }
  .cat-label {
    fill: #ffffff;
    text-anchor: middle;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1.5px;
  }
  .hub-label {
    fill: #1a1406;
    text-anchor: middle;
    font-weight: 800;
    font-size: 19px;
    letter-spacing: 1px;
  }
  .hub-pulse {
    fill: none;
    stroke: #f5d90a;
    stroke-width: 2.5;
    transform-box: fill-box;
    transform-origin: center;
    animation: hubpulse 2.6s ease-in-out infinite;
  }
  @keyframes hubpulse {
    0%   { transform: scale(1);    opacity: 0.9; }
    60%  { transform: scale(1.35); opacity: 0;   }
    100% { transform: scale(1.35); opacity: 0;   }
  }
  .title-txt { fill: #e8ecf1; font-size: 40px; font-weight: 700; letter-spacing: 2px; }
  .subtitle-txt { fill: #8b98a9; font-size: 20px; letter-spacing: 1.5px; }
</style>

